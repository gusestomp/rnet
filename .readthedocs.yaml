# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
    rust: "latest"
  apt_packages:
    - build-essential
    - cmake
    - perl
    - pkg-config
    - libclang-dev
    - musl-tools
    - git
  jobs:
    pre_install:
      - pip install maturin
      - maturin build --out dist
      - pip install --find-links=dist wreq
    # We recommend using a requirements file for reproducible builds.
    # This is just a quick example to get started.
    # https://docs.readthedocs.io/page/guides/reproducible-builds.html
    install:
      - pip install zensical
      - pip install .[docs]
    build:
      html:
        - zensical build -f docs/mkdocs.yml
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive docs/site/* $READTHEDOCS_OUTPUT/html/
